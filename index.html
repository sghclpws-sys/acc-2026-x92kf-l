<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>우리 가계부 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--bg:#F4F1EB;--surface:#FFFFFF;--surface2:#FAF8F4;--border:#E4DDD0;--text:#1A1714;--muted:#8A7F74;--accent:#C4793A;--accent2:#3A7DC4;--success:#3AA87D;--danger:#C43A3A;--r:16px;--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;color:var(--muted);transition:color .2s}
.nav-btn.active{color:var(--accent)}.nav-icon{font-size:22px;line-height:1}.nav-label{font-size:10px;font-weight:500;letter-spacing:.3px}
.main{padding:0 0 calc(76px + var(--safe-bottom));min-height:100vh}
.page{display:none;animation:fadeIn .2s ease}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.page-header{padding:18px 20px 0;position:sticky;top:0;background:var(--bg);z-index:10;padding-top:calc(18px + env(safe-area-inset-top,0px))}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.5px}.page-sub{font-size:12px;color:var(--muted);margin-top:2px}
.month-tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 20px 0;scrollbar-width:none}.month-tabs::-webkit-scrollbar{display:none}
.month-tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);transition:all .15s;flex-shrink:0}
.month-tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.section{padding:14px 20px 0}.section-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.card{background:var(--surface);border-radius:var(--r);padding:18px;border:1px solid var(--border);margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 20px 0}
.kpi-card{background:var(--surface);border-radius:14px;padding:14px 16px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.kpi-card.green::before{background:var(--success)}.kpi-card.red::before{background:var(--danger)}.kpi-card.blue::before{background:var(--accent2)}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.3px}
.kpi-value{font-size:16px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:4px}
.hero-card{background:linear-gradient(135deg,#C4793A 0%,#E0A46A 100%);border-radius:var(--r);padding:22px 20px;margin:14px 20px 0;position:relative;overflow:hidden;border:1px solid rgba(196,121,58,.25)}
.hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.25) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;color:rgba(255,255,255,.82);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.hero-amount{font-size:32px;font-weight:700;letter-spacing:-1px;color:white}.hero-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:4px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.hero-stat{background:rgba(255,255,255,.18);border-radius:10px;padding:12px}.hero-stat-label{font-size:10px;color:rgba(255,255,255,.82);margin-bottom:4px}.hero-stat-value{font-size:15px;font-weight:700;color:white}
.cat-bar-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}.cat-bar-row:last-child{border-bottom:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.cat-bar-label{font-size:13px;flex:1;font-weight:500}
.cat-bar-track{width:80px;height:5px;border-radius:3px;background:var(--surface2);overflow:hidden;flex-shrink:0}.cat-bar-fill{height:100%;border-radius:3px}
.insight-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.insight-row::-webkit-scrollbar{display:none}
.insight-chip{background:var(--surface2);border-radius:12px;padding:14px 16px;min-width:140px;flex-shrink:0;border:1px solid var(--border)}
.insight-chip-label{font-size:10px;color:var(--muted);margin-bottom:6px}.insight-chip-val{font-size:16px;font-weight:700}.insight-chip-sub{font-size:10px;color:var(--muted);margin-top:2px}
.si-item{display:flex;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:12px;margin-bottom:8px}
.si-icon{font-size:20px;flex-shrink:0;line-height:1.4}
.si-title{font-size:12px;font-weight:700;margin-bottom:3px}.si-body{font-size:12px;color:var(--muted);line-height:1.55}.si-action{font-size:11px;color:var(--muted);margin-top:6px;padding:6px 10px;background:var(--surface);border-radius:6px}
.cmp-row{margin-bottom:14px}
.cmp-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.cmp-cat{font-weight:600}.cmp-diff{font-weight:700}
.cmp-bars{display:flex;flex-direction:column;gap:3px}
.cmp-bar-wrap{display:flex;align-items:center;gap:6px}
.cmp-bar-lbl{font-size:9px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.cmp-bar-bg{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.cmp-bar-fill{height:100%;border-radius:3px}
.cmp-bar-val{font-size:10px;color:var(--muted);width:60px;text-align:right;flex-shrink:0}
.tx-date-group{margin-bottom:4px}.tx-date-label{font-size:11px;color:var(--muted);font-weight:600;padding:12px 0 6px;letter-spacing:.5px}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}.tx-item:last-child{border-bottom:none}
.tx-item:active{background:var(--surface2);margin:0 -16px;padding:12px 16px;border-radius:8px}
.tx-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--surface2)}
.tx-info{flex:1;min-width:0}.tx-store{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tx-note{font-size:11px;color:var(--muted);margin-top:2px}
.tx-amount{font-size:14px;font-weight:700;flex-shrink:0;text-align:right;color:var(--accent2)}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:12px 20px 0;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);transition:all .15s;flex-shrink:0}
.filter-chip.active{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.search-wrap{padding:12px 20px 0}.search-input{width:100%;padding:12px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--muted)}
.trend-bars{display:flex;gap:6px;align-items:flex-end}.trend-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.trend-bar-track{flex:1;width:100%;display:flex;align-items:flex-end}.trend-bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:4px}.trend-bar-label{font-size:9px;color:var(--muted)}
.donut-row{display:flex;gap:16px;align-items:center}.donut-legend-list{flex:1;display:flex;flex-direction:column;gap:8px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}.donut-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.donut-legend-name{flex:1;color:var(--muted)}.donut-legend-pct{font-weight:700;font-size:11px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}.overlay.show{display:flex}
.bottom-sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:8px 20px calc(32px + var(--safe-bottom));max-height:70vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.overlay.show .bottom-sheet{transform:translateY(0)}.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
.detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}.detail-row:last-child{border-bottom:none}
.detail-row-label{color:var(--muted)}.detail-row-value{font-weight:600;text-align:right;max-width:60%}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}.empty-icon{font-size:40px;margin-bottom:12px}
.info-bar{background:rgba(196,121,58,.1);border:1px solid rgba(196,121,58,.25);border-radius:10px;padding:10px 16px;margin:14px 20px 0;font-size:12px;color:var(--accent);display:flex;align-items:center;gap:8px}
</style>
</head>

</div>
<nav class="bottom-nav">

</nav>
<div class="overlay" id="txOverlay" onclick="closeTxSheet(event)">

</div>

function fmt(n){return(n||0).toLocaleString('ko-KR');}
function fmtW(n){return fmt(Math.round(n||0))+'원';}
function fmtSigned(n){return(n>=0?'+':'')+fmt(Math.abs(n||0))+'원';}
function fmtDate(d){var days=['일','월','화','수','목','금','토'];var dt=new Date(d+'T00:00:00');return d.slice(5,7)+'월 '+parseInt(d.slice(8,10))+'일 ('+days[dt.getDay()]+')';}

function getMonthTx(m){return TX.filter(function(t){return t.date.startsWith(m);});}
function getPrevKey(m){var y=parseInt(m.slice(0,4)),mo=parseInt(m.slice(5,7));var py=mo>1?y:y-1;var pm=mo>1?mo-1:12;return py+'-'+(pm<10?'0':'')+pm;}
function getIncome(key){var i=INCOME[key]||{};return(i.yejin||0)+(i.gihyuk||0)+(i.etc||0);}
function getInterestExpense(key){var i=INCOME[key]||{};return(i.interestExpense||0);}
function getCatBreakdown(txs){var map={};txs.forEach(function(t){var cat=t.category||'미분류';if(!map[cat])map[cat]=0;map[cat]+=(t.amount-(t.settlement||0));});return Object.entries(map).map(function(e){return{cat:e[0],total:Math.max(e[1],0)};}).sort(function(a,b){return b.total-a.total;});}

  document.getElementById('statsDonut').innerHTML='<div class="donut-row"><svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">'+svgP+'<text x="60" y="57" text-anchor="middle" font-size="9" fill="#8A7F74" font-family="sans-serif">카드지출</text><text x="60" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1714" font-family="sans-serif">'+fmtW(allTotal)+'</text></svg><div class="donut-legend-list">'+legendHtml+'</div></div>';
